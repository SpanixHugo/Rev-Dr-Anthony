<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Counseling Session | Rev. Fr. Anthony Ezekwu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #f8f8f8;
            color: #333;
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 2rem;
            font-size: 0.95rem;
            color: #444;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #c9a34e;
        }

        /* Header / Navbar */
        header {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 0.8rem 2rem;
            position: relative;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: auto;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #222;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #c9a34e;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #333;
        }

        /* Mobile Menu */
        @media (max-width: 768px) {
            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #fff;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 1rem 0;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }

            .hamburger {
                display: flex;
            }
        }

        /* Main Container */
        .container {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #c9a34e;
        }

        button {
            background: #c9a34e;
            color: #fff;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover {
            background: #a9893e;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #666;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

    <!-- Back to Home -->
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <!-- Main Booking Section -->
    <div class="container">
        <div class="card">
            <h2>Book a Counseling Session</h2>
            <form>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="session">Preferred Session Type</label>
                    <select id="session" required>
                        <option value="">-- Select --</option>
                        <option value="spiritual">Spiritual Counseling</option>
                        <option value="family">Family Counseling</option>
                        <option value="youth">Youth Guidance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Additional Notes</label>
                    <textarea id="message" rows="4" placeholder="Write any details..."></textarea>
                </div>
                <button type="submit">Book Session</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Rev. Fr. Anthony Ezekwu. All Rights Reserved.</p>
    </footer>

</body>

</html>
